name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deploy/k8s/overlays/prod/kustomization.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 67speedtest-release
  cancel-in-progress: true

env:
  APP_NAME: 67speedtest
  BUILD_NAMESPACE: build-jobs
  IMAGE_NAME: registry.144.91.77.245.sslip.io/67speedtest
  KUSTOMIZATION_PATH: deploy/k8s/overlays/prod/kustomization.yaml

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Launch Kubernetes build job
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::12}"
          JOB_NAME="${APP_NAME}-build-${SHORT_SHA}"
          echo "JOB_NAME=$JOB_NAME" >> "$GITHUB_ENV"

          kubectl delete job "$JOB_NAME" -n "$BUILD_NAMESPACE" --ignore-not-found=true --wait=false

          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: ${BUILD_NAMESPACE}
            labels:
              app.kubernetes.io/name: ${APP_NAME}
              app.kubernetes.io/part-of: ${APP_NAME}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 3600
            activeDeadlineSeconds: 1800
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: ${APP_NAME}
                  app.kubernetes.io/component: image-build
              spec:
                restartPolicy: Never
                volumes:
                  - name: workspace
                    emptyDir: {}
                  - name: docker-config
                    secret:
                      secretName: registry-push
                      items:
                        - key: .dockerconfigjson
                          path: config.json
                initContainers:
                  - name: checkout
                    image: alpine/git:latest
                    command:
                      - /bin/sh
                      - -lc
                    args:
                      - |
                        set -eux
                        git clone --depth 1 "${REPO_URL}" /workspace/repo
                        cd /workspace/repo
                        git fetch --depth 1 origin "${GITHUB_SHA}"
                        git checkout "${GITHUB_SHA}"
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2-debug
                    args:
                      - --context=dir:///workspace/repo
                      - --dockerfile=/workspace/repo/Dockerfile
                      - --destination=${IMAGE_NAME}:${IMAGE_TAG}
                      - --cache=true
                      - --cache-repo=${IMAGE_NAME}-cache
                    volumeMounts:
                      - name: workspace
                        mountPath: /workspace
                      - name: docker-config
                        mountPath: /kaniko/.docker
          EOF

          kubectl wait --for=condition=complete "job/${JOB_NAME}" -n "$BUILD_NAMESPACE" --timeout=30m

      - name: Print build logs on failure
        if: failure()
        run: |
          set -euo pipefail
          if [ -z "${JOB_NAME:-}" ]; then
            exit 0
          fi
          POD_NAME="$(kubectl get pod -n "$BUILD_NAMESPACE" -l job-name="$JOB_NAME" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [ -n "$POD_NAME" ]; then
            kubectl logs -n "$BUILD_NAMESPACE" "$POD_NAME" -c checkout || true
            kubectl logs -n "$BUILD_NAMESPACE" "$POD_NAME" -c kaniko || true
          fi

      - name: Delete build job
        if: always()
        run: |
          if [ -n "${JOB_NAME:-}" ]; then
            kubectl delete job "$JOB_NAME" -n "$BUILD_NAMESPACE" --ignore-not-found=true --wait=false
          fi

  update-manifest:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          content = path.read_text()
          updated, count = re.subn(
              r"(^\s*newTag:\s*).*$",
              lambda match: f"{match.group(1)}{os.environ['IMAGE_TAG']}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("expected a single newTag entry in the prod kustomization")
          path.write_text(updated)
          PY

      - name: Commit manifest update
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          if git diff --quiet -- "$KUSTOMIZATION_PATH"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_PATH"
          git commit -m "chore: release ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
